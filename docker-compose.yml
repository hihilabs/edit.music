services:
  edit-music:
    build: .
    container_name: edit-music
    restart: unless-stopped
    env_file: server/.env
    environment:
      - MUSIC_ROOT=/storage/music
      - RECYCLE_ROOT=/storage/recycle_bin
      - DATA_DIR=/data
      - PLEX_URL=http://host.docker.internal:32400
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/user/music:/storage/music
      - /mnt/user/music/.recycle:/storage/recycle_bin
      - /mnt/user/appdata/edit-music:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.edit-music.rule=Host(`edit.communityplaylist.com`)"
      - "traefik.http.routers.edit-music.entrypoints=websecure"
      - "traefik.http.routers.edit-music.tls=true"
      - "traefik.http.services.edit-music.loadbalancer.server.port=3001"
    networks:
      - traefik

networks:
  traefik:
    external: true
